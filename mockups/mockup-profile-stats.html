<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caliber – Profile (Stats Dashboard)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1c1c1e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  .phone { width: 390px; height: 844px; background: #000; border-radius: 50px; box-shadow: 0 0 0 2px #3a3a3c, 0 30px 80px rgba(0,0,0,.8); overflow: hidden; position: relative; display: flex; flex-direction: column; }
  .status { height: 50px; background: #000; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 28px 6px; color: #fff; font-size: 12px; font-weight: 600; flex-shrink: 0; }
  .dynamic-island { width: 120px; height: 34px; background: #000; border: 2px solid #1c1c1e; border-radius: 20px; position: absolute; top: 8px; left: 50%; transform: translateX(-50%); }
  .screen { flex: 1; overflow-y: auto; background: #000; }
  .tabbar { height: 83px; background: rgba(28,28,30,.92); backdrop-filter: blur(20px); border-top: 1px solid #2c2c2e; display: flex; align-items: flex-start; padding-top: 10px; flex-shrink: 0; }
  .tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; color: #636366; font-size: 10px; }
  .tab.active { color: #ff6b35; }
  .tab svg { width: 24px; height: 24px; }
  h2 { font-size: 16px; font-weight: 600; color: #fff; }
  .card { background: #1c1c1e; border-radius: 16px; padding: 16px; margin: 0 20px 12px; }
  .row { display: flex; justify-content: space-between; align-items: center; }
  .label { font-size: 12px; color: #8e8e93; text-transform: uppercase; letter-spacing: .5px; }
  .pill { background: #ff6b35; color: #fff; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
  .divider { height: 1px; background: #2c2c2e; margin: 10px 0; }
  .section-header { padding: 18px 20px 6px; font-size: 13px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: .5px; }
  .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 0 20px 16px; }
  .stat-card { background: #1c1c1e; border-radius: 16px; padding: 14px; }
  .stat-card .val { font-size: 24px; font-weight: 700; color: #fff; }
  .stat-card .unit { font-size: 12px; color: #8e8e93; }
  .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 24px; margin-top: 10px; }
  .bar-chart .bar { flex: 1; background: #ff6b35; border-radius: 4px 4px 0 0; height: 100%; }
  .bar-chart .bar.off { opacity: .3; height: 20%; }
  .avatar { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg,#ff6b35,#ff9166); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; color: #fff; }
  .profile-header { display: flex; align-items: center; gap: 14px; padding: 16px 20px 20px; }
  .profile-header .name { font-size: 20px; font-weight: 700; color: #fff; }
  .profile-header .sub { font-size: 13px; color: #8e8e93; margin-top: 2px; }
  .pr-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
  .pr-row .ex { font-size: 14px; color: #fff; font-weight: 500; }
  .pr-row .val { font-size: 14px; color: #ff6b35; font-weight: 700; }
  .settings-row { display: flex; align-items: center; gap: 12px; padding: 13px 20px; }
  .settings-icon { width: 30px; height: 30px; border-radius: 8px; background: #ff6b35; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .settings-icon.gray { background: #48484a; }
  .settings-row .t { font-size: 15px; color: #fff; flex: 1; }
  .chev { color: #48484a; }
  .muted { color: #8e8e93; font-size: 13px; }
</style>
</head>
<body>
<div class="phone">
  <div class="status">
    <div class="dynamic-island"></div>
    <span>9:41</span>
    <span style="display:flex;gap:5px;align-items:center;">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="1"/><rect x="4.5" y="2" width="3" height="10" rx="1"/><rect x="9" y="0" width="3" height="12" rx="1"/><rect x="13.5" y="1" width="2.5" height="11" rx="1" opacity=".3"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x=".5" y=".5" width="22" height="11" rx="3.5" stroke="#fff" stroke-opacity=".35"/><rect x="1.5" y="1.5" width="18" height="9" rx="2.5" fill="#fff"/><path d="M23 4v4a2 2 0 000-4z" fill="#fff" opacity=".4"/></svg>
    </span>
  </div>

  <div class="screen">
    <div class="profile-header">
      <div class="avatar">A</div>
      <div>
        <div class="name">Alex Rivera</div>
        <div class="sub">Member since Jan 2026</div>
      </div>
    </div>

    <div class="stat-row">
      <div class="stat-card"><div class="label">Total</div><div class="val">86</div><div class="unit">workouts</div></div>
      <div class="stat-card"><div class="label">Volume</div><div class="val">412k</div><div class="unit">lbs lifted</div></div>
    </div>

    <div style="padding: 0 20px; margin-bottom: 8px;" class="row"><h2>Streak</h2><span class="pill">🔥 12 days</span></div>
    <div class="card" style="padding: 14px 16px;">
      <div class="bar-chart">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar off"></div><div class="bar"></div><div class="bar"></div><div class="bar off"></div>
      </div>
    </div>

    <div class="section-header" style="padding-top:6px;">Personal Records</div>
    <div class="card">
      <div class="pr-row"><span class="ex">Bench Press</span><span class="val">185 lb × 5</span></div>
      <div class="divider"></div>
      <div class="pr-row"><span class="ex">Squat</span><span class="val">225 lb × 5</span></div>
      <div class="divider"></div>
      <div class="pr-row"><span class="ex">Deadlift</span><span class="val">275 lb × 3</span></div>
    </div>

    <div class="section-header" style="padding-top:6px;">Settings</div>
    <div class="card" style="padding:0;">
      <div class="settings-row"><div class="settings-icon">⚖️</div><div class="t">Units</div><span class="muted">lbs</span><span class="chev">›</span></div>
      <div class="divider" style="margin:0 20px;"></div>
      <div class="settings-row"><div class="settings-icon">🔔</div><div class="t">Notifications</div><span class="chev">›</span></div>
      <div class="divider" style="margin:0 20px;"></div>
      <div class="settings-row"><div class="settings-icon gray">📤</div><div class="t">Export Data</div><span class="chev">›</span></div>
      <div class="divider" style="margin:0 20px;"></div>
      <div class="settings-row"><div class="settings-icon gray">ℹ️</div><div class="t">About</div><span class="chev">›</span></div>
    </div>
    <div style="height: 20px;"></div>
  </div>

  <div class="tabbar">
    <div class="tab"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home</div>
    <div class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4v16M18 4v16M2 9h4M18 9h4M2 15h4M18 15h4"/></svg>Exercises</div>
    <div class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>History</div>
    <div class="tab active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>Profile</div>
  </div>
</div>
</body>
</html>

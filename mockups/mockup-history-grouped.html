<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caliber – History (Grouped List)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1c1c1e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  .phone { width: 390px; height: 844px; background: #000; border-radius: 50px; box-shadow: 0 0 0 2px #3a3a3c, 0 30px 80px rgba(0,0,0,.8); overflow: hidden; position: relative; display: flex; flex-direction: column; }
  .status { height: 50px; background: #000; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 28px 6px; color: #fff; font-size: 12px; font-weight: 600; flex-shrink: 0; }
  .dynamic-island { width: 120px; height: 34px; background: #000; border: 2px solid #1c1c1e; border-radius: 20px; position: absolute; top: 8px; left: 50%; transform: translateX(-50%); }
  .screen { flex: 1; overflow-y: auto; background: #000; }
  .tabbar { height: 83px; background: rgba(28,28,30,.92); backdrop-filter: blur(20px); border-top: 1px solid #2c2c2e; display: flex; align-items: flex-start; padding-top: 10px; flex-shrink: 0; }
  .tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; color: #636366; font-size: 10px; }
  .tab.active { color: #ff6b35; }
  .tab svg { width: 24px; height: 24px; }
  h1 { font-size: 28px; font-weight: 700; color: #fff; padding: 16px 20px 4px; }
  h2, h3 { color: #fff; }
  h3 { font-size: 15px; font-weight: 600; }
  .card { background: #1c1c1e; border-radius: 16px; padding: 16px; margin: 0 20px 12px; }
  .row { display: flex; justify-content: space-between; align-items: center; }
  .muted { color: #8e8e93; font-size: 13px; }
  .divider { height: 1px; background: #2c2c2e; margin: 10px 0; }
  .chip-row { display: flex; gap: 8px; padding: 0 20px 12px; overflow-x: auto; }
  .chip { background: #1c1c1e; border-radius: 20px; padding: 6px 14px; font-size: 13px; color: #ebebf5cc; white-space: nowrap; }
  .chip.active { background: #ff6b35; color: #fff; }
  .workout-row { display: flex; align-items: center; gap: 12px; }
  .workout-icon { width: 40px; height: 40px; border-radius: 12px; background: #ff6b3522; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .workout-meta { flex: 1; }
  .workout-meta .name { font-size: 15px; font-weight: 600; color: #fff; }
  .workout-meta .info { font-size: 12px; color: #8e8e93; }
  .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 90px; margin-top: 10px; }
  .bar-chart .bar { flex: 1; background: #ff6b35; border-radius: 4px 4px 0 0; opacity: .85; }
  .bar-chart .bar.today { opacity: 1; }
</style>
</head>
<body>
<div class="phone">
  <div class="status">
    <div class="dynamic-island"></div>
    <span>9:41</span>
    <span style="display:flex;gap:5px;align-items:center;">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="#fff"><rect x="0" y="3" width="3" height="9" rx="1"/><rect x="4.5" y="2" width="3" height="10" rx="1"/><rect x="9" y="0" width="3" height="12" rx="1"/><rect x="13.5" y="1" width="2.5" height="11" rx="1" opacity=".3"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x=".5" y=".5" width="22" height="11" rx="3.5" stroke="#fff" stroke-opacity=".35"/><rect x="1.5" y="1.5" width="18" height="9" rx="2.5" fill="#fff"/><path d="M23 4v4a2 2 0 000-4z" fill="#fff" opacity=".4"/></svg>
    </span>
  </div>

  <div class="screen">
    <h1>History</h1>
    <div class="chip-row">
      <div class="chip active">All</div>
      <div class="chip">Chest</div>
      <div class="chip">Back</div>
      <div class="chip">Legs</div>
      <div class="chip">Shoulders</div>
    </div>

    <div class="card">
      <div class="row"><h3>Weekly Volume</h3><span class="muted">18.2k lbs</span></div>
      <div class="bar-chart">
        <div class="bar" style="height:40%"></div>
        <div class="bar" style="height:65%"></div>
        <div class="bar" style="height:30%"></div>
        <div class="bar today" style="height:85%"></div>
        <div class="bar" style="height:50%"></div>
        <div class="bar" style="height:20%"></div>
        <div class="bar" style="height:0%"></div>
      </div>
    </div>

    <div class="card">
      <div class="workout-row">
        <div class="workout-icon">🏋️</div>
        <div class="workout-meta"><div class="name">Push Day A</div><div class="info">Yesterday · 52 min · 8 exercises</div></div>
        <svg width="8" height="14" viewBox="0 0 8 14" fill="#8e8e93"><path d="M1 1l6 6-6 6"/></svg>
      </div>
      <div class="divider"></div>
      <div class="workout-row">
        <div class="workout-icon">🦵</div>
        <div class="workout-meta"><div class="name">Leg Day</div><div class="info">Mon, Jul 6 · 65 min · 6 exercises</div></div>
        <svg width="8" height="14" viewBox="0 0 8 14" fill="#8e8e93"><path d="M1 1l6 6-6 6"/></svg>
      </div>
      <div class="divider"></div>
      <div class="workout-row">
        <div class="workout-icon">🏋️</div>
        <div class="workout-meta"><div class="name">Pull Day</div><div class="info">Sat, Jul 4 · 48 min · 7 exercises</div></div>
        <svg width="8" height="14" viewBox="0 0 8 14" fill="#8e8e93"><path d="M1 1l6 6-6 6"/></svg>
      </div>
      <div class="divider"></div>
      <div class="workout-row">
        <div class="workout-icon">💪</div>
        <div class="workout-meta"><div class="name">Arms + Core</div><div class="info">Thu, Jul 2 · 40 min · 5 exercises</div></div>
        <svg width="8" height="14" viewBox="0 0 8 14" fill="#8e8e93"><path d="M1 1l6 6-6 6"/></svg>
      </div>
    </div>
    <div style="height: 20px;"></div>
  </div>

  <div class="tabbar">
    <div class="tab"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home</div>
    <div class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4v16M18 4v16M2 9h4M18 9h4M2 15h4M18 15h4"/></svg>Exercises</div>
    <div class="tab active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>History</div>
    <div class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>Profile</div>
  </div>
</div>
</body>
</html>
